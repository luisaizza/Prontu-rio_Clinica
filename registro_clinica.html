{% extends "base_clinica.html" %}

{% block title %}Novo Usuário{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Novo Usuário da Equipe</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {{ form.hidden_tag() }}

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Usuário" required>
                            <label for="username"><i class="bi bi-person me-2"></i>Usuário</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Senha" required>
                            <label for="password"><i class="bi bi-lock me-2"></i>Senha</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="Confirmar Senha" required>
                            <label for="password_confirm"><i class="bi bi-check2-circle me-2"></i>Confirmar Senha</label>
                        </div>

                        <div class="form-floating mb-4">
                            <select class="form-select" id="perfil" name="perfil">
                                <option value="esteta">Esteta (Padrão)</option>
                                <option value="secretaria">Secretária</option>
                                <option value="admin">Administrador</option>
                            </select>
                            <label for="perfil"><i class="bi bi-shield-lock me-2"></i>Perfil de Acesso</label>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-person-plus me-2"></i>Cadastrar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
