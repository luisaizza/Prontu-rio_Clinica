databases:
  - name: prontuario-clinica-db
    plan: starter

services:
  - type: web
    name: prontuario-clinica
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    preDeployCommand: "flask db upgrade"
    startCommand: "gunicorn --workers 1 wsgi:app"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app_clinica.py
      - key: SETUP_ENABLED
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: prontuario-clinica-db
          property: connectionString
      - key: UPLOAD_FOLDER
        value: /var/data/uploads_clinica
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1

  - type: cron
    name: prontuario-clinica-lembretes
    runtime: python
    plan: starter
    schedule: "0 */4 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "flask lembretes-diarios"
    envVars:
      - key: FLASK_APP
        value: app_clinica.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: prontuario-clinica-db
          property: connectionString
