databases:
  - name: prontuario-clinica-db
    plan: free

services:
  - type: web
    name: prontuario-clinica
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    preDeployCommand: "flask db upgrade"
    startCommand: "gunicorn --workers 1 wsgi:app"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app_clinica.py
      - key: DATABASE_URL
        fromDatabase:
          name: prontuario-clinica-db
          property: connectionString
