{% extends "base_clinica.html" %}
{% block title %}Editar Anamnese - {{ paciente.nome_completo }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Editar Anamnese de {{ paciente.nome_completo }}</h2>
            <p class="text-muted mb-0">Realizada em: {{ anamnese.data_anamnese | datetimeformat }}</p>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('editar_anamnese', paciente_id=paciente.id, anamnese_id=anamnese.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <label for="queixa_principal" class="form-label">Queixa Principal</label>
                    <textarea class="form-control" id="queixa_principal" name="queixa_principal" rows="3">{{ anamnese.queixa_principal or '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label for="historico_doenca_atual" class="form-label">Histórico da Doença Atual</label>
                    <textarea class="form-control" id="historico_doenca_atual" name="historico_doenca_atual" rows="3">{{ anamnese.historico_doenca_atual or '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label for="historico_patologico_pregresso" class="form-label">Histórico Patológico Pregresso</label>
                    <textarea class="form-control" id="historico_patologico_pregresso" name="historico_patologico_pregresso" rows="3">{{ anamnese.historico_patologico_pregresso or '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label for="historico_familiar" class="form-label">Histórico Familiar</label>
                    <textarea class="form-control" id="historico_familiar" name="historico_familiar" rows="3">{{ anamnese.historico_familiar or '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label for="habitos_vida" class="form-label">Hábitos de Vida</label>
                    <textarea class="form-control" id="habitos_vida" name="habitos_vida" rows="3">{{ anamnese.habitos_vida or '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label for="medicamentos_uso" class="form-label">Medicamentos em Uso</label>
                    <textarea class="form-control" id="medicamentos_uso" name="medicamentos_uso" rows="3">{{ anamnese.medicamentos_uso or '' }}</textarea>
                </div>
                <div class="mb-3">
                    <label for="alergias" class="form-label">Alergias</label>
                    <textarea class="form-control" id="alergias" name="alergias" rows="3">{{ anamnese.alergias or '' }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                <a href="{{ url_for('ver_paciente', paciente_id=paciente.id) }}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
