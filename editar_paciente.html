{% extends "base_clinica.html" %}
{% block title %}Editar Paciente{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>Editar Dados de {{ paciente.nome_completo }}</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="nome_completo" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome_completo" name="nome_completo" value="{{ paciente.nome_completo }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" name="cpf" value="{{ paciente.cpf or '' }}" placeholder="000.000.000-00">
                    </div>
                    <div class="mb-3">
                        <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                        <input type="date" class="form-control" id="data_nascimento" name="data_nascimento" value="{{ paciente.data_nascimento.strftime('%Y-%m-%d') if paciente.data_nascimento }}">
                    </div>
                    <div class="mb-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control" id="telefone" name="telefone" value="{{ paciente.telefone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ paciente.email or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="historico_medico" class="form-label">Histórico Médico (Alergias, condições, etc.)</label>
                        <textarea class="form-control" id="historico_medico" name="historico_medico" rows="3">{{ paciente.historico_medico or '' }}</textarea>
                    </div>
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="consentimento_lgpd" name="consentimento_lgpd" {% if paciente.consentimento_lgpd %}checked{% endif %}>
                        <label for="consentimento_lgpd" class="form-check-label">
                            Paciente concordou com o tratamento de dados (LGPD)
                            {% if paciente.data_consentimento_lgpd %}
                                <span class="text-muted">— último registro em {{ paciente.data_consentimento_lgpd | datetimeformat }}</span>
                            {% endif %}
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    <a href="{{ url_for('ver_paciente', paciente_id=paciente.id) }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
